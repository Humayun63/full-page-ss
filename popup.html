<!DOCTYPE html>
<html>
<body style="font-family:sans-serif; padding:10px; width:250px;">
  <div style="margin-top:8px; border:1px solid #ccc; border-radius:4px; overflow:hidden; font-size:12px;">
    <label style="display:flex; align-items:center; gap:6px; padding:5px 8px; background:#f0f0f0; cursor:pointer; font-weight:600; margin:0;">
      <input type="checkbox" id="naming-toggle" /> Advanced naming
    </label>
    <div id="naming-panel" style="display:none; border-top:1px solid #ccc; padding:6px 8px;">
      <div style="margin-bottom:6px;">
        <label style="font-size:11px; display:flex; align-items:center; gap:4px; cursor:pointer; padding:2px 0;">
          <input type="checkbox" id="include-domain" checked /> Domain
        </label>
        <label style="font-size:11px; display:flex; align-items:center; gap:4px; cursor:pointer; padding:2px 0;">
          <input type="checkbox" id="include-title" checked /> Title
        </label>
        <label style="font-size:11px; display:flex; align-items:center; gap:4px; cursor:pointer; padding:2px 0;">
          <input type="checkbox" id="include-time" checked /> Time
        </label>
        <label style="font-size:11px; display:flex; align-items:center; gap:4px; cursor:pointer; padding:2px 0;">
          <input type="checkbox" id="include-device" /> Device
        </label>
      </div>
      <input id="custom-name" placeholder="Custom name (optional)" style="width:100%; box-sizing:border-box; font-size:11px; padding:4px;" />
    </div>
  </div>

  <div style="margin-top:8px; border:1px solid #ccc; border-radius:4px; overflow:hidden; font-size:12px;">
    <label style="display:flex; align-items:center; gap:6px; padding:5px 8px; background:#f0f0f0; cursor:pointer; font-weight:600; margin:0;">
      <input type="checkbox" id="responsive-toggle" /> Responsive capture
    </label>
    <div id="device-panel" style="display:none; border-top:1px solid #ccc; padding:6px 8px;">
      <div id="device-list"></div>
      <div id="custom-rows"></div>
      <button id="add-custom" type="button" style="margin-top:5px; width:100%; font-size:11px; padding:3px 0; cursor:pointer;">+ Add custom width</button>
    </div>
  </div>

  <button id="start" style="margin-top:8px; width:100%;">Capture</button>

  <script src="popup.js"></script>
</body>
</html>
